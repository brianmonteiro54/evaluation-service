name: CI-CD

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  packages: write
  security-events: write

env:
  GO_VERSION: "1.22"
  AWS_REGION: us-east-1
  ECR_REPOSITORY: togglemaster/${{ github.event.repository.name }}
  IMAGE_TAG: ${{ github.sha }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6
      - name: Configurar Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Baixar dependências
        run: go mod download
      - name: Build
        run: go build ./...
      - name: Rodar testes unitários
        run: go test ./... -cover

  lint:
    name: Linter / Static Analysis
    runs-on: ubuntu-latest
    needs: build-test
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6
      - name: Configurar Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Rodar golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11

  security-scan:
    name: Security Scan (SAST & SCA)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6
      - name: Configurar Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: SAST com gosec
        uses: securego/gosec@master
        continue-on-error: true
        with:
          args: ./...
      - name: SCA com Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

  docker-build-push:
    name: Docker Build & Push to ECR
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout do código
        uses: actions/checkout@v6

      - name: Configurar credenciais AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build da imagem Docker
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .

      - name: Scan da imagem com Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true

      - name: Tag da imagem para ECR
        run: |
          docker tag $ECR_REPOSITORY:$IMAGE_TAG \
            ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Push da imagem para ECR
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Atualizar imagem no repo de deploy
        run: |
          FULL_IMAGE="${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}"

          git clone https://x-access-token:${{ secrets.DEPLOY_REPO_TOKEN }}@github.com/${{ github.repository_owner }}/deploy-evaluation-service.git deploy-repo
          cd deploy-repo

          echo "=== ANTES ==="
          grep "image:.*evaluation-service" manifests/deployment.yaml

          sed -i "s|image:.*evaluation-service:.*|image: ${FULL_IMAGE}|" manifests/deployment.yaml

          echo "=== DEPOIS ==="
          grep "image:.*evaluation-service" manifests/deployment.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifests/deployment.yaml
          git diff --cached --quiet && echo "SEM MUDANCAS - sed nao alterou nada" && exit 1
          git commit -m "deploy: evaluation-service ${GITHUB_SHA::8}"
          git push origin main